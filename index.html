<!DOCTYPE html>
<html>
  <head>
    <style type="text/css" media="screen">
      body {
        margin: 0;
        background: #888;
      }
      svg {
        display: block;
      }
      svg.bordered rect {
        stroke: #888;
        stroke-width: 1;
      }
      #grid-controls {
        padding: 4px;
      }
    </style>
  </head>
  <body>
    <svg id="grid"></svg>
    <div id="grid-controls">
      <label><input type="checkbox" id="grid-toggle"> Grid</label>
      <label><input type="checkbox" id="hs-toggle" title="Horisontal Symmetry"> HS</label>
      <label><input type="checkbox" id="vs-toggle" title="Vertical Symmetry"> VS</label>
      <button id="cycle-btn">Cycle</button>
    </div>
    <script type="text/javascript">
      "use strict";

      const grid = document.getElementById("grid");
      const gridToggle = document.getElementById("grid-toggle");
      const hsToggle = document.getElementById("hs-toggle");
      const vsToggle = document.getElementById("vs-toggle");
      const cycleBtn = document.getElementById("cycle-btn");

      const field_width = 49;
      const field_height = 49;
      const cell_size = 12;
      const step = cell_size;

      function* range(limit) { for (let i = 0; i < limit; i++) yield i }
      const xs = () => range(field_width);
      const ys = () => range(field_height);

      const fib = {};
      {
        const mi = field_width + field_height;
        let [a, b] = [1, 2];
        while (a < mi) {
          fib[a] = true;
          [a, b] = [b, a + b];
        }
      }

      const palette = Array.from({length: 10}, (_, i) => {
        const v = Math.round(i * 255 / 9).toString(16).padStart(2, "0");
        return `#${v}${v}${v}`;
      });

      const cells = {};
      const update = (x, y) => {
        const rect = cells[y][x];
        const state = (+rect.dataset.state + 1) % 10;
        rect.dataset.state = state;
        rect.setAttribute("fill", palette[state]);
      };

      const middleX = 24;
      const middleY = 24;

      const applyClick = (cx, cy) => {
        for (let y of ys()) {
          for (let x of xs()) {
            const d = Math.abs(cx - x) + Math.abs(cy - y); // Manhattan
            if (fib[d]) update(x, y);
          }
        }
      };

      const onClick = (event) => {
        const cx = +event.currentTarget.dataset.x;
        const cy = +event.currentTarget.dataset.y;
        const hs = hsToggle.checked && cx !== middleX;
        const vs = vsToggle.checked && cy !== middleY;

        const points = [[cx, cy]];
        if (hs) points.push([2 * middleX - cx, cy]);
        if (vs) points.push([cx, 2 * middleY - cy]);
        if (hs && vs) points.push([2 * middleX - cx, 2 * middleY - cy]);

        for (const [px, py] of points) applyClick(px, py);
      };

      function prepareGrid(svg) {
        const svgW = field_width * step;
        const svgH = field_height * step;
        svg.setAttribute("width", svgW);
        svg.setAttribute("height", svgH);
        svg.setAttribute("viewBox", `0 0 ${svgW} ${svgH}`);

        for (let y of ys()) {
          const row_cells = {};
          cells[y] = row_cells;
          for (let x of xs()) {
            const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            rect.setAttribute("x", x * step);
            rect.setAttribute("y", y * step);
            rect.setAttribute("width", cell_size);
            rect.setAttribute("height", cell_size);
            rect.setAttribute("fill", "#000");
            rect.dataset.x = x;
            rect.dataset.y = y;
            rect.dataset.state = "0";
            rect.style.cursor = "pointer";
            rect.addEventListener("click", onClick);
            svg.appendChild(rect);
            row_cells[x] = rect;
          }
        }
      }

      prepareGrid(grid);

      const toggleGrid = () => grid.classList.toggle("bordered", gridToggle.checked);
      gridToggle.addEventListener("change", toggleGrid);

      // browser remembers the checkbox's state so we need to sync the grid visibility
      toggleGrid();

      cycleBtn.addEventListener("click", () => {
        for (let y of ys()) {
          for (let x of xs()) {
            update(x, y);
          }
        }
      });
    </script>
  </body>
</html>
